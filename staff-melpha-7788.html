<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Melpha Control Panel - CREW ONLY</title>
    <style>
        :root { --primary: #004080; --accent: #28a745; --bg: #121212; --card-bg: #1e1e1e; --text: #fff; --add-bg: #252525; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        header { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 30px; }
        .section-title { color: var(--accent); border-left: 5px solid var(--accent); padding-left: 10px; margin: 30px 0 15px; }
        
        /* 新設：個別追加セクション */
        .add-box { background: var(--add-bg); border: 2px solid var(--accent); border-radius: 15px; padding: 25px; margin-bottom: 40px; }
        .add-row { display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #333; }
        .stock-input { width: 100%; font-size: 2.5rem; background: #000; border: 2px solid #444; color: var(--accent); text-align: center; border-radius: 10px; padding: 10px 0; }
        
        .time-input { width: 180px; font-size: 1.8rem; padding: 15px; background: #000; color: #fff; border: 1px solid #444; border-radius: 10px; text-align: center; }
        .event-input { flex: 1; min-width: 250px; font-size: 1.8rem; padding: 15px; background: #000; color: #fff; border: 1px solid #444; border-radius: 10px; }
        
        .btn { width: 100%; padding: 20px; font-size: 1.6rem; font-weight: bold; color: white; border: none; border-radius: 15px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .btn-add { background: var(--accent); border: 2px solid #fff; }
        .btn-stock { background: var(--primary); }
    </style>
</head>
<body>
    <header><h1>CREW CONTROL PANEL</h1></header>
    
    <div class="add-box">
        <h2 style="margin-top:0; color: var(--accent);">➕ 新しく予定を追加</h2>
        <div class="add-row">
            <input type="time" id="new-time" class="time-input">
            <input type="text" id="new-event" class="event-input" placeholder="予定の内容（例：右手地区 到着）">
        </div>
        <button class="btn btn-add" onclick="addNewEvent()">この予定を個別に追加する</button>
    </div>

    <h2 class="section-title">DRINK INVENTORY</h2>
    <div class="grid">
        <div class="card"><h3>🥤 コーラ</h3><input type="number" id="stock-コーラ" class="stock-input" value="24"></div>
        <div class="card"><h3>🍊 オレンジ</h3><input type="number" id="stock-オレンジ" class="stock-input" value="12"></div>
        <div class="card"><h3>🍵 お茶</h3><input type="number" id="stock-お茶" class="stock-input" value="20"></div>
        <div class="card"><h3>☕ コーヒー</h3><input type="number" id="stock-コーヒー" class="stock-input" value="15"></div>
    </div>
    <button class="btn btn-stock" onclick="updateStocks()">在庫を更新</button>

<script>
    const SCHEDULE_GAS_URL = "https://script.google.com/macros/s/AKfycbw10y64_2j3hNASY-G3tKo_VN1rHwsYCiUoh0DdwuCu1ufffCqixQmhRq4rzDU4wCSL/exec";
    const STOCK_GAS_URL = "https://script.google.com/macros/s/AKfycbwdIqFf4sdBLWPchI-ibV_EIO2z0WgRgmegXm7ipi2IeI6QQYtozvVAmVj8LP-GIqKYow/exec";

    /**
     * 【新機能】予定を1件ずつ個別に追加
     */
    async function addNewEvent() {
        const time = document.getElementById('new-time').value;
        const event = document.getElementById('new-event').value;
        
        if(!time || !event) {
            alert("時刻と内容の両方を入力してください");
            return;
        }

        if(!confirm("この予定を追加しますか？\n既存の予定は消えません。")) return;

        try {
            const response = await fetch(SCHEDULE_GAS_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: "add_event", 
                    time: time, 
                    event: event 
                })
            });
            
            alert("予定を追加しました！\n1分以内に自動で正しい順番に並び変わります。");
            document.getElementById('new-event').value = ""; // 入力欄をクリア
        } catch (e) {
            alert("送信エラーが発生しました。ネット接続を確認してください。");
        }
    }

    async function updateStocks() {
        const stocks = {};
        ["コーラ", "オレンジ", "お茶", "コーヒー"].forEach(n => stocks[n] = Number(document.getElementById(`stock-${n}`).value));
        if(!confirm("在庫を更新しますか？")) return;
        await fetch(STOCK_GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "update_all_stocks", stocks: stocks })});
        alert("在庫を更新しました");
    }
</script>
</body>
</html>
