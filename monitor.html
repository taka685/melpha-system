<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>今後の予定表 - Monitor</title>
    <style>
        :root {
            --primary: #004080;
            --accent: #28a745;
            --bg: #000000; 
            --text: #ffffff;
        }

        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
        }

        /* 画面全体のレイアウト */
        body {
            display: flex;
            flex-direction: column;
            padding: 20px 40px;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--primary);
            padding-bottom: 10px;
            flex-shrink: 0; /* ヘッダーの高さは固定 */
        }

        .title-text {
            font-size: 2.5rem;
            letter-spacing: 8px;
            font-weight: bold;
            color: #fff;
        }

        .current-time {
            font-size: 2.5rem;
            color: var(--accent);
            font-family: 'Courier New', monospace;
        }

        /* 予定表示エリア：画面の残りの高さを埋める */
        .schedule-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
            margin-top: 20px;
            overflow: hidden;
        }

        /* 各アイテム：3つ表示された時に均等な高さになるよう設定 */
        .schedule-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 0 30px;
            border-radius: 20px;
            border-left: 20px solid var(--accent);
            flex: 1; /* 3つの要素を均等な高さにする */
            min-height: 0; /* flexアイテムの縮小を許可 */
        }

        .time {
            font-size: 8vh; /* 画面の高さに合わせて調整 */
            font-weight: bold;
            min-width: 280px;
            color: var(--text);
        }

        .event {
            font-size: 7vh; /* 画面の高さに合わせて調整 */
            flex: 1;
            padding-left: 40px;
            border-left: 3px solid #444;
            /* 長い文字でも見切れないように折り返しを許可、または調整 */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.2;
        }

        #empty-msg {
            text-align: center;
            font-size: 4rem;
            margin-top: 100px;
            color: #444;
        }
    </style>
</head>
<body>

    <header>
        <div class="title-text">今後の予定表</div>
        <div id="clock" class="current-time">00:00:00</div>
    </header>

    <div id="schedule-display" class="schedule-container">
        <div id="empty-msg">運行予定を読み込み中...</div>
    </div>

    <script>
        const SCHEDULE_GAS_URL = "https://script.google.com/macros/s/AKfycbwww1bX-0RGKppugkUQ0tfydXnVYLzh3Kl7BIkbLrPJmQKeInwOSrMq-YM9tkV1B4Ll/exec"; 

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);

        async function fetchSchedule() {
            try {
                const res = await fetch(SCHEDULE_GAS_URL);
                const data = await res.json();
                const container = document.getElementById('schedule-display');

                if (!data || data.length === 0) {
                    container.innerHTML = '<div id="empty-msg">本日の予定はすべて終了しました</div>';
                    return;
                }

                // 画面には最大3つだけ表示
                const displayData = data.slice(0, 3);

                let html = '';
                displayData.forEach(item => {
                    html += `
                        <div class="schedule-item">
                            <div class="time">${item.time}</div>
                            <div class="event">${item.event}</div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (e) {
                console.error("取得エラー:", e);
            }
        }

        fetchSchedule();
        // 10秒ごとに自動更新（指示通り10000msに設定）
        setInterval(fetchSchedule, 10000);
    </script>
</body>
</html>
